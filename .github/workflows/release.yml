name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Test / ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest       # Linux x86-64
          - macos-latest        # macOS arm64 (Apple Silicon)
          - windows-latest      # Windows x86-64
        python-version:
          - "3.14"
          - "3.14t"             # free-threading (experimental)

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - run: uv sync --frozen
      - run: uv run pytest -v

  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Verify tag matches package version
        shell: python
        run: |
          import re, sys
          tag = "${{ github.ref_name }}"
          version = tag.lstrip("v")
          with open("pyproject.toml") as f:
              content = f.read()
          match = re.search(r'^version\s*=\s*"([^"]+)"', content, re.MULTILINE)
          if not match:
              sys.exit("Could not find version in pyproject.toml")
          if match.group(1) != version:
              sys.exit(f"Tag {tag!r} does not match pyproject.toml version {match.group(1)!r}")
          print(f"Version check passed: {version}")

      - name: Build wheel and sdist
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/ircio/
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
